## help
helpTitle=Ayuda
helpVersion=Versión
helpAuthor=Desarrollado por
helpText=\
    <p>Esta extensión se creó para simplificar las tareas rutinarias de trabajar con texto, como colocarlo en una imagen, alinear el texto y realizar la gestión de estilos. Te permite:</p>\
        <ul><li>Personalizar la lista de Estilos, que podrían aplicarse al texto pegado, así como aplicar Estilos a Capas de Texto ya existentes.</li>\
        <li>Almacene y edite texto en Photoshop</li>\
        <li>Cree capas de texto a partir de las líneas de texto que especifique y colóquelas en el centro del área seleccionada.</li>\
        <li>Alinee las capas de texto existentes, cambie rápidamente sus estilos y contenido.</li>\
        <li>Importe y exporte configuraciones y estilos como un archivo JSON. Eso podría ser útil para importar la configuración después de reinstalar Photoshop, o para compartir su configuración con otras personas.</li></ul>\
    <h3>Video de guía:</h3>\
    <p><span class="link" onclick="window.cep.util.openURLInDefaultBrowser('https://youtu.be/QwxG2S_PCMQ')">https://youtu.be/QwxG2S_PCMQ</span></p>\
    <h3>Lista de estilos:</h3>\
    <p>Cómo crear un nuevo Estilo:</p>\
        <ul><li>Haga clic en "🞥 Agregar estilo" en la mitad inferior de la ventana de la extensión.</li>\
        <li>Escriba el nombre del estilo en la nueva ventana (por ejemplo, normal, grito, SFX, etc.).</li>\
        <li>Configure las opciones de estilo con uno de los 2 métodos siguientes: seleccione una capa de texto con el estilo que necesita y haga clic en "❐ Copiar estilo de capa", o especifique la configuración manualmente en el formulario debajo de ese botón.</li> \
        <li>Puede especificar etiquetas de estilo (sepárelas con espacio) para la configuración de estilo automática. Si alguna línea comienza con una de las etiquetas de estilo, entonces el estilo mencionado se seleccionará automáticamente, mientras que la etiqueta no está presente en la capa.</li>\
        <li>Puede especificar el color de la etiqueta para cada estilo y las etiquetas de colores se resaltarán en el texto.</li>\
        <li>Haga clic en "Guardar".</li></ul>\
    <p>Puede editar estilos, eliminarlos y cambiar su orden arrastrándolos. Si hace clic en el estilo, se activará y se resaltará en color azul.</p>\
    <p>Al hacer clic en la flecha ⧁ cerca de un estilo, puedes aplicarlo a la capa de texto actual.</p>\
     <p>Puede agrupar estilos en carpetas que también puede editar, ordenar y eliminar. Al eliminar una carpeta, se mueven sus estilos a la sección "Sin clasificar".</p>\
     <h3>Bloque de texto:</h3>\
     <p>El texto escrito o pegado se divide automáticamente en líneas. Una de las líneas se selecciona como activa. Estará resaltada en color azul y podrá ver su contenido en la Zona de vista previa en la sección superior de la ventana de la extensión.</p>\
     <p>Para seleccionar cualquier Línea como activa, haga clic en ⭗ a su izquierda. También puede usar los botones "Anterior ⇧" y "Siguiente ⇩" a la izquierda de la zona de vista previa.</p>\
    <p>Si una línea comienza con una de las etiquetas de estilo (dicha etiqueta se resalta con un color), el estilo se aplica si selecciona la línea. Si hay un estilo predeterminado (que puede configurar en Configuración), entonces, si una línea no tiene etiqueta de estilo, el estilo predeterminado se aplica a la línea.</p>\
    <p>Las líneas vacías se resaltan en color gris y se ignoran mientras navega por el texto. También puede configurar etiquetas para ignorar líneas que no estén vacías (como punteros de página o notas del traductor).</p>\
    <p>Al hacer clic en la flecha ⧁ a la derecha de una línea, su texto se pegará en la capa de texto activa. Las etiquetas de estilo no se incluirán en el texto pegado. El estilo del texto no se modificará; sin embargo, si la capa está vacía, se aplicará el estilo predeterminado de Photoshop.</p>\
    <h3>Zona de vista previa:</h3>\
    <p>La Zona de vista previa muestra el contenido de la línea activa con el estilo activo aplicado. Puede ver la siguiente información arriba: número de la línea activa, nombre del estilo activo y escala del tamaño de fuente.</p>\
    <p>Con la escala, puede cambiar el tamaño del texto pegado sin afectar los parámetros de Estilo. Por ejemplo, cuando trabaje con escaneos pequeños, puede configurar la escala al 50%, lo que hará que cualquier texto pegado sea dos veces más pequeño de lo que está configurado en Estilo.</p>\
    <p>Si no se especifica, el tamaño de fuente se establece de acuerdo con lo que se especificó en el Estilo actual. Si cambia su tamaño, se utilizará siempre que no haya elegido otro Estilo.</p>\
    <p>Al hacer clic en la flecha ⧁, el texto con el estilo se aplicará a la capa de texto actual (atajo de teclado: <b>Win + Shift</b>). La siguiente línea se activará.</p>\
    <h3>Pegar y Alinear:</h3>\
     <p>Seleccione un Área con "Marco Rectangular", "Lazo", "Varita Mágica" o cualquier otra herramienta. El Área Seleccionada puede tener cualquier forma, solo se toman en cuenta los 4 puntos extremos. Luego haga clic en uno de los siguientes botones:</p>\
         <ul><li>"Pegar": se creará una nueva capa de texto, que consiste en la línea activa con el estilo activo, en medio del área seleccionada. La siguiente línea se activará.</li>\
         <li>"Alinear": la capa de texto actual se alineará con el centro del área seleccionada.</li></ul>\
     <p>Hay atajos de teclado diseñados para realizar rápidamente dichas acciones: <b>Win + Ctrl</b> para "Pegar" y <b>Win + Alt</b> para "Alinear".</p>

