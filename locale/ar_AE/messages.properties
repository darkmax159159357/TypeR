## help
helpTitle=مساعدة
helpVersion=إصدار
helpAuthor=تطوير
helpText=\
    <p>تم إنشاء هذه الإضافة لتبسيط المهام الروتينية للعمل مع النص، مثل وضعه على صورة، محاذاة النص وإدارة الأنماط. وتتيح لك:</p>\
        <ul><li>تخصيص قائمة الأنماط، والتي يمكن تطبيقها على النص المُلصق، وكذلك تطبيق الأنماط على الطبقات النصية الموجودة مسبقًا.</li>\
        <li>تخزين وتعديل النص داخل الفوتوشوب</li>\
        <li>إنشاء طبقات نصية من سطور النص التي تحددها ووضعها في منتصف المنطقة المحددة.</li>\
        <li>محاذاة الطبقات النصية الموجودة، تغيير أنماطها ومحتواها بسرعة.</li>\
        <li>استيراد وتصدير الإعدادات والأنماط كملف JSON. قد يكون هذا مفيدًا لاستيراد الإعدادات بعد إعادة تثبيت فوتوشوب، أو لمشاركة إعداداتك مع الآخرين.</li></ul>\
    <h3>دليل الفيديو:</h3>\
    <p><span class="link" onclick="window.cep.util.openURLInDefaultBrowser('https://youtu.be/QwxG2S_PCMQ')">https://youtu.be/QwxG2S_PCMQ</span></p>\
    <h3>قائمة الأنماط:</h3>\
    <p>كيفية إنشاء نمط جديد:</p>\
        <ul><li>انقر فوق "🞥 إضافة نمط" في النصف السفلي من نافذة الإضافة.</li>\
        <li>اكتب اسم النمط في النافذة الجديدة (مثل عادي، صراخ، مؤثرات صوتية، إلخ).</li>\
        <li>قم بإعداد خيارات النمط بإحدى الطريقتين التاليتين: حدد طبقة نصية بالنمط الذي تحتاجه وانقر فوق "❐ نسخ نمط الطبقة"، أو حدد الإعدادات يدويًا في النموذج أسفل هذا الزر.</li>\
        <li>يمكنك تحديد علامات الأنماط (افصل بينها بمسافة) لتعيين النمط تلقائيًا. إذا بدأ أي سطر بإحدى علامات الأنماط، فسيتم تحديد النمط المذكور تلقائيًا.</li>\
        <li>يمكنك تحديد لون العلامة لكل نمط، وسيتم تمييز العلامات الملونة في النص.</li>\
        <li>انقر فوق "حفظ".</li></ul>\
    <p>يمكنك تحرير الأنماط وحذفها وتغيير ترتيبها عن طريق سحبها. إذا قمت بالنقر فوق النمط، فسيصبح نشطًا ويتم تمييزه باللون الأزرق.</p>\
    <p>من خلال النقر على السهم ⧁ بالقرب من النمط، يمكنك تطبيقه على الطبقة النصية الحالية.</p>\
    <p>يمكنك تجميع الأنماط في مجلدات والتي يمكنك أيضًا تحريرها وفرزها وحذفها. يؤدي حذف مجلد إلى نقل أنماطه إلى قسم "غير مصنفة".</p>\
    <h3>كتلة النص:</h3>\
    <p>يتم تقسيم النص المكتوب أو المُلصق تلقائيًا إلى أسطر. يتم تحديد أحد الأسطر كنشط. يتم تمييزه باللون الأزرق ويمكنك رؤية محتواه في منطقة المعاينة في القسم العلوي من نافذة الإضافة.</p>\
    <p>لكي تحدد أي سطر كنشط، انقر فوق ⭗ على يساره. كما يمكنك استخدام زري "السابق ⇧" و "التالي ⇩" يسار منطقة المعاينة.</p>\
    <p>إذا بدأ السطر بإحدى علامات الأنماط (يتم تمييز العلامة المذكورة بلون)، يتم تطبيق النمط إذا حددت السطر. إذا تم تحديد نمط افتراضي (والذي يمكنك تعيينه في الإعدادات)، فإنه إذا لم يكن للسطر علامة نمط، يتم تطبيق النمط الافتراضي على السطر.</p>\
    <p>يتم تمييز الأسطر الفارغة باللون الرمادي ويتم تجاهلها أثناء التنقل في النص. يمكنك أيضًا تعيين علامات لتجاهل الأسطر غير الفارغة (مثل مؤشرات الصفحات أو ملاحظات المترجم).</p>\
    <p>عن طريق النقر على السهم ⧁ على يسار السطر، سيتم لصق نصه في الطبقة النصية النشطة. لن يتم تضمين علامات الأنماط في النص المُلصق. لن يتم تعديل نمط النص، ولكن إذا كانت الطبقة فارغة، فسيتم تطبيق نمط فوتوشوب الافتراضي.</p>\
    <h3>منطقة المعاينة:</h3>\
    <p>تعرض منطقة المعاينة محتويات السطر النشط مع النمط النشط المطبق عليه. يمكنك رؤية المعلومات التالية أعلاه: رقم السطر النشط، اسم النمط النشط وتحجيم حجم الخط.</p>\
    <p>مع التحجيم، يمكنك تغيير حجم النص المُلصق دون التأثير على معلمات النمط. على سبيل المثال، عند العمل بالصور الصغيرة، يمكنك ضبط التحجيم على 50٪ مما سيجعل أي نص مُلصق أصغر مرتين مما هو محدد في النمط.</p>\
    <p>إذا لم يتم تحديده، يتم تعيين حجم الخط وفقًا لما تم تحديده في النمط الحالي. إذا قمت بتغيير حجمه، فسيتم استخدامه طالما لم تختر نمطًا آخر.</p>\
    <p>من خلال النقر على السهم ⧁، سيتم تطبيق النص بالنمط على الطبقة النصية الحالية (اختصار لوحة المفاتيح: <b>Win + Shift</b>). سيتم تعيين السطر التالي كنشط.</p>\
    <h3>اللصق والمحاذاة:</h3>\
    <p>حدد منطقة باستخدام "أداة التحديد المستطيل"، "أداة التحديد الحر"، "العصا السحرية" أو أي أداة أخرى. يمكن أن يكون للمنطقة المحددة أي شكل، يتم أخذ النقاط الأربع المتطرفة فقط في الاعتبار. ثم انقر فوق أحد الأزرار التالية:</p>\
        <ul><li>"لصق" - سيتم إنشاء طبقة نصية جديدة، تتكون من السطر النشط بالنمط النشط، في منتصف المنطقة المحددة. سيتم تعيين السطر التالي كنشط.</li>\
        <li>"محاذاة" - ستتم محاذاة الطبقة النصية الحالية في منتصف المنطقة المحددة.</li></ul>\
    <p>تم تصميم اختصارات لوحة المفاتيح لإجراء سريع للأفعال المذكورة: <b>Win + Ctrl</b> للصق و <b>Win + Alt</b> للمحاذاة.</p>

