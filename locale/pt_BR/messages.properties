## Ajuda
helpTitle=Ajuda
helpVersion=Versão
helpAuthor=desenvolvido por
helpText=\
    <p>Essa extensão foi criada para simplificar as tarefas rotineiras de trabalhar com texto, como colocá-lo em uma imagem, alinhar o texto e executar o gerenciamento de estilo. Ele permite que você:</p>\
        <ul><li>Personalize a lista de Estilos, que poderiam ser aplicados ao texto colado, bem como aplicando estilos para camadas de texto já existentes.</li>\
        <li>Armazene e edite texto no Photoshop</li>\
        <li>Criar camadas de texto a partir de linhas de texto especificadas e colocá-las no centro da Área Selecionada.</li>\
        <li>Alinhe as camadas de texto existentes, altere rapidamente seus estilos e conteúdo.</li>\
        <li>Importe e exportar configurações e Estilos com um arquivo JSON. Isso pode ser útil para importar as configurações após a reinstalação do Photoshop ou para compartilhar suas configurações com outras pessoas.</li></ul>\
    <h3>Vídeo Guia:</h3>\
    <p><span class="link" onclick="window.cep.util.openURLInDefaultBrowser('https://youtu.be/QwxG2S_PCMQ')">https://youtu.be/QwxG2S_PCMQ</span></p>\
    <h3>Lista de estilos:</h3>\
    <p>Como criar um novo estilo:</p>\
        <ul><li>Clique em "🞥 Adicionar Estilo" na metade inferior da janela de extensão.</li>\
        <li>Digite o nome do Estilo na nova janela (por exemplo, regular, grito, SFX etc.).</li>\
        <li>Configure as opções de Estilo com um dos dois métodos seguintes: selecione uma Camada de Texto com o estilo que você precisa e clique em "❐ Copiar Estilo de Camada", ou especifique as configurações manualmente no formulário abaixo desse botão.</li>\
        <li>Você pode especificar as Tags de Estilo (separá-las usando o espaço) para a configuração automática do estilo. Se qualquer Linha começar com uma das Tags de Estilo, então o Estilo mencionado será selecionado automaticamente, enquanto para a Tag não estar presente na Camada.</li>\
        <li>Você pode especificar a Cor da tag para cada Estilo, e as Tags coloridas serão destacadas no texto.</li>\
        <li>Clica em "Salvar".</li></ul>\
    <p>Você pode editar Estilos, eliminá-los e alterar seu pedido, arrastando-os. Se você clicar no Estilo, ele se tornará ativo e será realçado com cor azul.</p>\
    <p>Clicando na seta ⧁ perto de um Estilo, você pode aplicá-lo à Camada de Texto atual.</p>\
    <p>Você pode agrupar Estilos em pastas que você também pode editar, classificar e excluir. A exclusão de uma pasta resulta na movimentação de seus Estilos para a seção "Não classificado".</p>\
    <h3>Bloco de texto:</h3>\
    <p>O texto digitado ou colado é automaticamente dividido por linhas. Uma das Linhas é selecionada como ativa. Ela é destacada com cor azul e você pode ver seu conteúdo na Zona de Pré-visualização na seção superior da janela de extensão.</p>\
    <p>Para selecionar qualquer Linha como ativa, clique em ⭗ à sua esquerda. Você também pode usar os botões "Anterior ⇧", e "Próximo ⇩" à esquerda da Zona de visualização prévia.</p>\
    <p>Se uma Linha começa com uma das Tags de Estilo (a referida tag é destacada com uma cor), o Estilo é aplicado se você selecionar a Linha. Se houver um Estilo Padrão (que você pode definir em Configurações) especificado, então, se uma Linha não tiver uma Tag de Estilo, o Estilo Padrão será aplicado à Linha.</p>\
    <p>As linhas vazias são destacadas com a cor cinza e são ignoradas enquanto você navega no texto. Você também pode definir Tags para ignorar Linhas não vazias (como apontadores de página ou notas do tradutor).</p>\
    <p>Ao clicar na seta ⧁ à direita de uma Linha, seu texto será colado na camada de texto ativa. As etiquetas de estilo não serão incluídas no texto colado. O estilo do texto não será modificado, entretanto, se a Camada estiver vazia, então o estilo padrão do Photoshop será aplicado.</p>\
    <h3>Zona de pré-visualização:</h3>\
    <p>Zona de pré-visualização exibe o conteúdo da Linha ativa com um Estilo ativo aplicado a ela. Você pode ver as seguintes informações acima: número da Linha ativa, nome do Estilo ativo e escala de tamanho da fonte.</p>\
    <p>Com a escala você pode mudar o tamanho do texto colado sem afetar os parâmetros de Estilo. Por exemplo, ao trabalhar com pequenas scans (está escrito scan, mas se refere ao tamanho das fontes que uma obra ou scan usa), você pode definir o escalonamento para 50%, o que tornará qualquer texto colado duas vezes menor do que ele é definido em Estilo.</p>\
    <p>Se não especificado, o tamanho da fonte é definido de acordo com o que foi especificado no Estilo atual. Se você mudar seu tamanho, ele será usado desde que você não tenha escolhido outro Estilo.</p>\
    <p>Ao clicar na seta ⧁, o texto com o Estilo será aplicado à Camada de Texto atual (atalho no teclado: <b>Win + Shift</b>). A próxima Linha será ativada.</p>\
    <h3>Colando e Alinhando:</h3>\
    <p>Selecione uma área com "Marcador retangular", "Laço", "Varinha mágica" ou qualquer outra ferramenta. A área selecionada pode ter qualquer forma, somente os 4 pontos extremos são levados em consideração. Em seguida, clique em um dos seguintes botões:</p>\
        <ul><li>"Colar" - uma nova camada de texto, que consiste na Linha ativa com o Estilo ativo, será criada no meio da Área Selecionada. A próxima Linha será definida como ativa.</li>\
        <li>"Alinhar" - a atual camada de texto será alinhada pelo centro da Área Selecionada.</li></ul>\
    <p>Há atalhos no teclado projetados para a execução rápida das referidas ações: <b>Win + Ctrl</b> para "Colar" e <b>Win + Alt</b> para "Alinhar".</p>

