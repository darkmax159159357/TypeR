## help
helpTitle=Справка
helpVersion=версия
helpAuthor=автор:
helpText=\
    <p>Данное расширение создано для упрощения рутинной работы по переносу текста на изображение, его центровке и назначению стилей. Оно позволяет:</p>\
        <ul><li>Создавать список стилей, которые будут применяться к вставляемому тексту. А также быстро применять стили к уже существующим текстовым слоям.</li>\
        <li>Хранить и редактировать текст внутри Фотошопа</li>\
        <li>Создавать текстовые слои из отдельных строк текста и размещать их по центру выделенной области.</li>\
        <li>Центрировать уже существующие текстовые слои, быстро менять их стили и содержимое.</li>\
        <li>Импортировать и экспортировать настройки и стили в файл формата json. Это может быть полезно для восстановления настроек после переустановки Фотошопа или чтобы поделиться ими с другими людьми.</li></ul>\
    <h3>Видео с инструкциями:</h3>\
    <p><span class="link" onclick="window.cep.util.openURLInDefaultBrowser('https://youtu.be/AWnu-J0wGRU')">https://youtu.be/AWnu-J0wGRU</span></p>\
    <h3>Список стилей:</h3>\
    <p>Порядок действий для создания нового стиля:</p>\
        <ul><li>Нажмите кнопку "🞥 Добавить стиль" в нижней части расширения.</li>\
        <li>В открывшемся окне введите название стиля (например: обычный, крик, звук...).</li>\
        <li>Задайте параметры стиля одним из двух способов: либо выберите в любом документе текстовый слой с нужным стилем и нажмите кнопку "❐ Скопировать стиль слоя", либо укажите параметры вручную в форме под этой кнопкой.</li>\
        <li>Можете перечислить (через пробел) префиксы для автоматического выбора стиля. Если в тексте какая-либо строка будет начинаться с одного из этих префиксов, то при её выборе данный стиль автоматически станет активным. При этом префикс не будет вставляться в слой вместе с текстом.</li>\
        <li>Можете указать цвет, которым будет выделяться префикс, если он встретится в тексте.</li>\
        <li>Нажмите кнопку "Сохранить".</li></ul>\
    <p>Созданные стили можно редактировать, удалять и менять их порядок перетаскиванием. При нажатии на стиль он станет активным и выделится синим цветом.</p>\
    <p>Нажав на кнопку со стрелкой ⧁ возле каждого стиля, можно применить его к текущему текстовому слою.</p>\
    <p>Стили могут быть группированы по папкам, которые также можно редактировать, сортировать и удалять. При удалении папки все находящиеся в ней стили будут перенесены в раздел "Без папки".</p>\
    <h3>Текстовый блок:</h3>\
    <p>Напечатанный или вставленный текст автоматически разбивается на строки. Одна из строк отмечается как активная. Она выделяется синим цветом и её содержимое можно увидеть в зоне предпросмотра в верхней части расширения.</p>\
    <p>Чтобы сделать какую-либо строку активной нажмите на кружок ⭗ слева от неё. Также можно воспользоваться кнопками "Предыдущая ⇧", "Следующая ⇩" слева от зоны предпросмотра.</p>\
    <p>Если строка начинается с одного из префиксов стилей (он будет выделен цветом), то при её выборе этот стиль станет активным. Если в настройках приложения указать стиль по умолчанию, то при отсутствии у строки префикса, активным будет становиться он.</p>\
    <p>Пустые строки выделяются серым цветом и игнорируются при навигации по тексту. В настройках расширения можно также задать префиксы для игнорирования непустых строк (например указателей страниц или комментариев переводчика).</p>\
    <p>При нажатии на стрелку ⧁ справа от строки, её текст будет вставлен в текущий текстовый слой. Префиксы стилей при этом исключаются. Стиль текста изменён не будет, но если слой был пустым, то применится стиль Фотошопа по умолчанию.</p>\
    <h3>Зона предпросмотра:</h3>\
    <p>В зоне предпросмотра отображается содержимое активной строки с применённым к ней активным стилем. Сверху располагается строка с информацией: номер активной строки, название активного стиля и масштабирование размера текста.</p>\
    <p>С помощью масштабирования можно менять размер вставляемого текста без внесения изменений в параметры стилей. Например, при работе с маленькими сканами можно выставить масштаб 50%, в результате чего размер вставляемого текста уменьшится в 2 раза по сравнению с тем, что указан в стиле.</p>\
    <p>При нажатии на кнопку со стрелкой ⧁, к текущему текстовому слою будет применён текст со стилем и указанным размером (клавиатурное сокращение: <b>Win + Shift</b>). При этом активной станет следующая строка.</p>\
    <h3>Вставка и выравнивание:</h3>\
    <p>Выделите в документе область инструментами "Прямоугольная область", "Лассо", "Волшебная палочка" или любыми другими. Выделение может быть любой формы, учитываются только четыре крайние точки. Затем нажмите одну из кнопок:</p>\
        <ul><li>"Вставить" - в центре выделенной области будет создан новый текстовый слой, содержащий активную строку с активным стилем. При успешной вставке активной станет следующая строка.</li>\
        <li>"Выровнять" - текущий текстовый слой будет выровнен по центру выделенной области.</li></ul>\
    <p>Для ускорения этих действий имеются клавиатурные сокращения: <b>Win + Ctrl</b> для кнопки "Вставить" и <b>Win + Alt</b> для кнопки "Выровнять".</p>

