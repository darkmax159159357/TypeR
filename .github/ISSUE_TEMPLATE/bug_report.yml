name: Bug Report
  description: Report a bug or issue with TypeR
  title: "[Bug] "
  labels: ["bug"]
  body:
    - type: markdown
      attributes:
        value: |
          Thanks for reporting a bug! Please fill out the details below.
    - type: input
      id: ps-version
      attributes:
        label: Photoshop Version
        description: e.g. Photoshop CC 2024, PS 2019
        placeholder: "Photoshop CC 2024"
      validations:
        required: true
    - type: dropdown
      id: os
      attributes:
        label: Operating System
        options:
          - Windows 10
          - Windows 11
          - macOS
      validations:
        required: true
    - type: input
      id: typer-version
      attributes:
        label: TypeR Version
        description: Found in Help modal footer
        placeholder: "2.9.5"
      validations:
        required: true
    - type: textarea
      id: description
      attributes:
        label: What happened?
        description: Describe the bug clearly
        placeholder: "When I click ... it does ..."
      validations:
        required: true
    - type: textarea
      id: steps
      attributes:
        label: Steps to Reproduce
        description: How can we reproduce the issue?
        placeholder: |
          1. Open TypeR
          2. Click on ...
          3. See error
      validations:
        required: true
    - type: textarea
      id: expected
      attributes:
        label: Expected Behavior
        description: What should have happened?
      validations:
        required: false
    - type: textarea
      id: screenshots
      attributes:
        label: Screenshots
        description: If applicable, add screenshots to help explain
      validations:
        required: false
  