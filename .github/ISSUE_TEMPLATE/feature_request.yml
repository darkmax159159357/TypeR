name: Feature Request
  description: Suggest a new feature or improvement
  title: "[Feature] "
  labels: ["enhancement"]
  body:
    - type: markdown
      attributes:
        value: |
          Have an idea to improve TypeR? We'd love to hear it!
    - type: textarea
      id: description
      attributes:
        label: What feature would you like?
        description: Describe the feature clearly
        placeholder: "I would like TypeR to ..."
      validations:
        required: true
    - type: textarea
      id: use-case
      attributes:
        label: Use Case
        description: How would this help your workflow?
      validations:
        required: false
    - type: textarea
      id: alternatives
      attributes:
        label: Alternatives Considered
        description: Any workarounds you currently use?
      validations:
        required: false
  